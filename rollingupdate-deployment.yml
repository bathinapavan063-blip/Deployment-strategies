apiVersion: apps/v1
kind: Deployment
metadata:
 name: rollingupdate-nginx-deployment
 labels:
  name: web-app
  type: frontend
spec:
 template:
  metadata:
   name: nginx-pod
   labels:
    name: web-app
    type: frontend
  spec:
   containers:
   - name: nginx-container
     image: nginx:latest
 replicas: 30
 strategy:
  type: RollingUpdate
  rollingUpdate:
   maxSurge: 1                    
   maxUnavailable: 1              
 selector:
  matchLabels:
   name: web-app
   type: frontend
